name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: macos-15
    environment: public-release
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.13.0
          run_install: false
      - run: pnpm install --frozen-lockfile
      - name: Verify immutable release preconditions
        run: node scripts/verify-release-preconditions.mjs
      - name: Install checksum-pinned Godot 4.7
        env:
          GODOT_URL: https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_macos.universal.zip
          GODOT_SHA512: 0d5d635e6d78d4c2b1286586ca62af249609c2f70815b35437049f08476714d08b913faaf8c10f37313c932ee24c4f87a829899c84fa248f788fb612b8f79229
        run: |
          curl --fail --location --retry 3 --output godot.zip "$GODOT_URL"
          echo "$GODOT_SHA512  godot.zip" | shasum -a 512 -c -
          mkdir -p "$RUNNER_TEMP/godot"
          ditto -x -k godot.zip "$RUNNER_TEMP/godot"
          echo "GODOT_BIN=$RUNNER_TEMP/godot/Godot.app/Contents/MacOS/Godot" >> "$GITHUB_ENV"
      - run: pnpm qa:phase-11
      - run: node scripts/build-release.mjs release/out
      - run: node scripts/verify-release.mjs release/out
      - name: Attest exact release artifacts
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: release/out/*
      - name: Publish npm tarballs with trusted publishing
        run: for artifact in release/out/*.tgz; do npm publish "$artifact" --access public --provenance; done
      - name: Publish exact GitHub release set
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/out/* --verify-tag --generate-notes
