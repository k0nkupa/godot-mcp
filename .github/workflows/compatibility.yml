name: compatibility

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "addons/**"
      - "packages/**"
      - "release/compatibility-matrix.json"
      - "scripts/qa-phase-11.mjs"
      - ".github/workflows/compatibility.yml"

permissions:
  contents: read

jobs:
  baseline-4-7-macos:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.13.0
          run_install: false
      - run: pnpm install --frozen-lockfile
      - name: Install checksum-pinned Godot 4.7
        env:
          GODOT_URL: https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_macos.universal.zip
          GODOT_SHA512: 0d5d635e6d78d4c2b1286586ca62af249609c2f70815b35437049f08476714d08b913faaf8c10f37313c932ee24c4f87a829899c84fa248f788fb612b8f79229
        run: |
          curl --fail --location --retry 3 --output godot.zip "$GODOT_URL"
          echo "$GODOT_SHA512  godot.zip" | shasum -a 512 -c -
          mkdir -p "$RUNNER_TEMP/godot"
          ditto -x -k godot.zip "$RUNNER_TEMP/godot"
          echo "GODOT_BIN=$RUNNER_TEMP/godot/Godot.app/Contents/MacOS/Godot" >> "$GITHUB_ENV"
      - name: Run exact compatibility gate
        run: pnpm qa:phase-11
      - name: Upload failure evidence only
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: phase-11-macos-4.7-failure
          if-no-files-found: ignore
          path: qa-failure-artifacts/**
          retention-days: 7

  pending-matrix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Keep uncertified cells visibly pending
        run: node -e 'const m=require("./release/compatibility-matrix.json"); const pending=m.cells.filter(c=>c.state==="pending"); if(!pending.length) throw new Error("No pending cells"); console.log(JSON.stringify(pending))'
